# ==========================================
# FSAD-PS06 Investment Perception Platform
# ==========================================

spring.application.name=Investment Perception Platform

# --- Default: H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:mutual_fund_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- JWT Configuration ---
# Local default so `mvn spring-boot:run` works without manually exporting env vars.
# The render profile overrides this and still requires JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:dev-local-jwt-secret-change-me-before-shipping-2026}
app.jwt.expiration-ms=86400000
app.auth.code-expiration-minutes=10
app.auth.captcha-expiration-minutes=10

# --- Stripe Configuration ---
stripe.api.secret-key=sk_test_your_stripe_secret_key_here
stripe.api.public-key=pk_test_your_stripe_public_key_here

# --- Google OAuth ---
app.google.client-id=${GOOGLE_CLIENT_ID:75114719261-n2f50sgmafqju6739nuo0lggpne51b5a.apps.googleusercontent.com}

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# --- Email ---
app.mail.enabled=${MAIL_ENABLED:auto}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=${MAIL_TEST_CONNECTION:false}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}
spring.mail.properties.mail.smtp.ssl.protocols=${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}

# --- Server ---
server.port=8080
