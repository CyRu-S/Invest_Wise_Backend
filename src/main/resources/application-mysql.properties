# MySQL profile: activate with SPRING_PROFILES_ACTIVE=mysql or combine it with other profiles.
# Supports this app's MYSQL_* variables and Railway-style MYSQLHOST / MYSQLPORT / MYSQLDATABASE / MYSQLUSER / MYSQLPASSWORD names.
spring.datasource.url=${MYSQL_JDBC_URL:jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:localhost}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DB:${MYSQLDATABASE:mutual_fund_db}}?createDatabaseIfNotExist=true&useSSL=${MYSQL_SSL_ENABLED:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQLPASSWORD:root}}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
