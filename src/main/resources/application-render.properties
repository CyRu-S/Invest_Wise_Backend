# Render profile: activate with SPRING_PROFILES_ACTIVE=render
# Uses the default datasource unless a second profile like mysql is also enabled.

# --- Server (Render assigns PORT dynamically) ---
server.port=${PORT:8080}

# --- CORS (set via env var on Render) ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# --- JWT / Auth ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.auth.code-expiration-minutes=${AUTH_CODE_EXPIRATION_MINUTES:10}
app.auth.captcha-expiration-minutes=${AUTH_CAPTCHA_EXPIRATION_MINUTES:10}
app.google.client-id=${GOOGLE_CLIENT_ID:75114719261-n2f50sgmafqju6739nuo0lggpne51b5a.apps.googleusercontent.com}

# --- Email ---
app.mail.enabled=${MAIL_ENABLED:auto}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=${MAIL_TEST_CONNECTION:false}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}
spring.mail.properties.mail.smtp.ssl.protocols=${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
